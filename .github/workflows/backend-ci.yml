name: Backend CI

on:
  push:
    branches:
      - develop
    paths:
      - 'backend/**'
      - 'HealthCore.sln'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'HealthCore.sln'

jobs:
  build:
    name: Build backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore HealthCore.sln

      - name: Build
        run: dotnet build HealthCore.sln --configuration Release --no-restore
